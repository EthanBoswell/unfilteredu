<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Sticky note background -->
  <rect x="0" y="0" width="100" height="100" rx="4" fill="#f5e642"/>
  <!-- Folded corner -->
  <path d="M72 0 L100 0 L100 28 Z" fill="#e0d030"/>
  <path d="M72 0 L72 28 L100 28" fill="none" stroke="#c8bb20" stroke-width="1"/>
  <!-- Tape at top -->
  <rect x="28" y="-7" width="44" height="14" rx="2" fill="rgba(255,255,255,0.45)"/>
  <!-- U letterform -->
  <text x="50" y="78" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#1a0a2e" text-anchor="middle">U</text>
  <!-- Ruled lines like a real sticky note -->
  <line x1="10" y1="88" x2="62" y2="88" stroke="#1a0a2e" stroke-width="1" opacity="0.18"/>
  <line x1="10" y1="94" x2="44" y2="94" stroke="#1a0a2e" stroke-width="1" opacity="0.18"/>
</svg>
